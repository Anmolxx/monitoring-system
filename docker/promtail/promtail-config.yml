server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: demo-app
    static_configs:
      - targets:
          - localhost
        labels:
          app: demo-app
          env: production
          __path__: /app/logs/app.log
    pipeline_stages:
      - regex:
          expression: '.*\[(?P<level>[A-Z]+)\].*'
      - labels:
          level:

  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          app: syslog
          __path__: /var/log/syslog

  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          app: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            time: time
      - timestamp:
          source: time
          format: RFC3339Nano
      - output:
          source: output